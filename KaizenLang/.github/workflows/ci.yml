name: CI

on:
  push:
    branches: [ main, base ]
  pull_request:
    branches: [ main, base ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    - name: Restore
      run: dotnet restore KaizenLang.sln
    - name: Build
      run: dotnet build KaizenLang.sln -c Release --no-restore
    - name: Test
      run: dotnet test KaizenLang\tests\KaizenLang.Tests\KaizenLang.Tests.csproj -c Release --no-build
