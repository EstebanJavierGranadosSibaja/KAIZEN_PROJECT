name: 'Format: dotnet-format'

on:
  push:
    branches: [ 'base', 'main', 'master' ]
  pull_request:
    branches: [ 'base', 'main', 'master' ]

jobs:
  dotnet-format:
    name: Check code format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install dotnet-format tool
        run: dotnet tool install -g dotnet-format --version 6.0.250901

      - name: Add tool to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Run dotnet format (verify)
        run: dotnet format KaizenLang.sln --verify-no-changes --severity info
